<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>竹竿人醉酒對決</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-around;
            color: white; font-family: Arial; font-size: 24px; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="p1-hp">Player 1: 100</div>
    <div id="p2-hp">Player 2: 100</div>
</div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Constraint, Vector, Events } = Matter;

// 初始化引擎
const engine = Engine.create();
const world = engine.world;
const render = Render.create({
    element: document.body,
    engine: engine,
    options: {
        width: window.innerWidth,
        height: window.innerHeight,
        wireframes: false, // 設為 false 顯示顏色
        background: '#333'
    }
});

Render.run(render);
Runner.run(Runner.create(), engine);

// 建立地面
const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight - 20, window.innerWidth, 40, { isStatic: true, render: { fillStyle: '#555' } });
Composite.add(world, ground);

// 建立火柴人函式
function createRagdoll(x, y, color) {
    const group = Matter.Body.nextGroup(true);
    
    // 身體各部位
    const head = Bodies.circle(x, y - 80, 15, { collisionFilter: { group: group }, render: { fillStyle: color } });
    const chest = Bodies.rectangle(x, y - 40, 20, 50, { collisionFilter: { group: group }, render: { fillStyle: color } });
    const arm = Bodies.rectangle(x + 20, y - 55, 40, 10, { collisionFilter: { group: group }, render: { fillStyle: color } });
    
    // 連結身體 (脖子)
    const neck = Constraint.create({
        bodyA: head, bodyB: chest,
        pointB: { x: 0, y: -25 },
        stiffness: 0.2, render: { visible: false }
    });

    // 連結手臂 (肩膀)
    const shoulder = Constraint.create({
        bodyA: chest, bodyB: arm,
        pointA: { x: 10, y: -15 },
        pointB: { x: -20, y: 0 },
        stiffness: 0.4, render: { visible: true, strokeStyle: '#fff' }
    });

    // 腳部固定 (讓角色稍微站立但會晃)
    const leg = Bodies.rectangle(x, y, 20, 40, { collisionFilter: { group: group }, render: { fillStyle: color } });
    const waist = Constraint.create({
        bodyA: chest, bodyB: leg,
        pointA: { x: 0, y: 25 },
        pointB: { x: 0, y: -20 },
        stiffness: 0.1, render: { visible: false }
    });

    Composite.add(world, [head, chest, arm, leg, neck, shoulder, waist]);
    
    return { head, chest, arm };
}

const player1 = createRagdoll(200, window.innerHeight - 100, '#007AFF');
const player2 = createRagdoll(window.innerWidth - 200, window.innerHeight - 100, '#FF3B30');

// 射擊邏輯
function shoot(fighter, direction) {
    // 讓手臂向上旋轉力矩
    Matter.Body.applyForce(fighter.arm, fighter.arm.position, { x: 0, y: -0.02 });

    // 建立子彈
    const bullet = Bodies.circle(fighter.arm.position.x + (30 * direction), fighter.arm.position.y, 5, {
        frictionAir: 0,
        render: { fillStyle: 'yellow' }
    });
    Matter.Body.setVelocity(bullet, { x: 15 * direction, y: -2 });
    Composite.add(world, bullet);

    // 後座力推動身體
    Matter.Body.applyForce(fighter.chest, fighter.chest.position, { x: -0.01 * direction, y: 0 });

    // 子彈消失計時
    setTimeout(() => Composite.remove(world, bullet), 2000);
}

// 平板觸控事件
window.addEventListener('touchstart', (e) => {
    const touchX = e.touches[0].clientX;
    if (touchX < window.innerWidth / 2) {
        shoot(player1, 1);
    } else {
        shoot(player2, -1);
    }
});

// 視窗調整
window.addEventListener('resize', () => {
    render.canvas.width = window.innerWidth;
    render.canvas.height = window.innerHeight;
});
</script>
</body>
</html>
