<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>竹竿人：醉酒雙搖桿對決 (正姿高跳版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-around;
            color: white; font-size: 24px; font-weight: bold; pointer-events: none;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
        }
        .joystick-zone { position: absolute; bottom: 0; width: 50%; height: 45%; z-index: 10; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }
        .hp-bar { width: 200px; height: 20px; background: #555; border: 2px solid #fff; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.2s; }
        #p1-fill { background: #1e90ff; } /* 藍色 */
        #p2-fill { background: #ff4757; } /* 紅色 */
    </style>
</head>
<body>

<div id="ui">
    <div>
        PLAYER 1 (BLUE)
        <div class="hp-bar"><div id="p1-fill" class="hp-fill"></div></div>
    </div>
    <div>
        PLAYER 2 (RED)
        <div class="hp-bar"><div id="p2-fill" class="hp-fill"></div></div>
    </div>
</div>

<div id="left-zone" class="joystick-zone"></div>
<div id="right-zone" class="joystick-zone"></div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Constraint, Body, Events, Query } = Matter;

const engine = Engine.create();
const world = engine.world;
engine.gravity.y = 1.2;

const render = Render.create({
    element: document.body,
    engine: engine,
    options: {
        width: window.innerWidth,
        height: window.innerHeight,
        wireframes: false,
        background: '#2c3e50'
    }
});

Render.run(render);
Runner.run(Runner.create(), engine);

// 環境設定
const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight - 20, window.innerWidth, 40, { isStatic: true, friction: 1, render: { fillStyle: '#34495e' } });
const wallL = Bodies.rectangle(-20, window.innerHeight/2, 40, window.innerHeight, { isStatic: true });
const wallR = Bodies.rectangle(window.innerWidth + 20, window.innerHeight/2, 40, window.innerHeight, { isStatic: true });
Composite.add(world, [ground, wallL, wallR]);

// 建立火柴人
function createFighter(x, y, color, direction) {
    const group = Body.nextGroup(true);
    const head = Bodies.circle(x, y - 100, 18, { collisionFilter: { group: group }, density: 0.001, render: { fillStyle: color } });
    const chest = Bodies.rectangle(x, y - 60, 25, 60, { collisionFilter: { group: group }, density: 0.002, render: { fillStyle: color } });
    
    // 🔥 修正軸心與生成位置：依據方向決定手朝下的正確旋轉角度
    const armAngle = direction === 1 ? Math.PI / 2 : -Math.PI / 2;
    // 配合手臂長度與旋轉，將 y 座標下調至 y - 55，使端點剛好對齊胸部關節 (y - 80)
    const armY = y - 55; 
    const arm = Bodies.rectangle(x, armY, 55, 12, { 
        collisionFilter: { group: group }, 
        density: 0.001, 
        angle: armAngle, // 確保兩者的手都是自然垂下
        render: { fillStyle: color } 
    });
    
    const leg = Bodies.rectangle(x, y, 35, 50, { collisionFilter: { group: group }, density: 0.01, friction: 1, render: { fillStyle: color } });

    // 頭要立好：提升頸部關節 stiffness 至 0.9，使頭部更穩固
    const neck = Constraint.create({ bodyA: head, bodyB: chest, pointA: { x: 0, y: 15 }, pointB: { x: 0, y: -30 }, stiffness: 0.9, length: 2, render: { visible: false } });
    
    // 手放在身體正中央 (pointA.x: 0)，並準確連接受力點 (pointB.x) 確保軸心正確
    const shoulder = Constraint.create({ bodyA: chest, bodyB: arm, pointA: { x: 0, y: -20 }, pointB: { x: direction * -25, y: 0 }, stiffness: 0.9, length: 2 });
    
    // 讓腿部與胸部連結更死，不再搖晃 (stiffness 1)
    const waist = Constraint.create({ bodyA: chest, bodyB: leg, pointA: { x: 0, y: 30 }, pointB: { x: 0, y: -25 }, stiffness: 1, length: 2, render: { visible: false } });

    // 魁儡支撐，防止徹底倒地
    const support = Constraint.create({
        pointA: { x: x, y: y - 120 },
        bodyB: chest,
        stiffness: 0.006,
        length: 50,
        render: { visible: false }
    });

    const fighter = { head, chest, arm, leg, support, hp: 100, color, direction, lastShoot: 0, lastJump: 0, spawnPos: { x: x, y: y } };
    Composite.add(world, [head, chest, arm, leg, neck, shoulder, waist, support]);
    return fighter;
}

const p1 = createFighter(window.innerWidth * 0.25, window.innerHeight - 100, '#1e90ff', 1); // 藍色
const p2 = createFighter(window.innerWidth * 0.75, window.innerHeight - 100, '#ff4757', -1); // 紅色

// 射擊
function shoot(fighter) {
    const now = Date.now();
    if (now - fighter.lastShoot < 400) return;
    fighter.lastShoot = now;

    const shootAngle = fighter.arm.angle + (fighter.direction === -1 ? Math.PI : 0);

    const bulletX = fighter.arm.position.x + Math.cos(shootAngle) * 35;
    const bulletY = fighter.arm.position.y + Math.sin(shootAngle) * 35;
    
    const bullet = Bodies.circle(bulletX, bulletY, 7, { label: 'bullet', frictionAir: 0, density: 0.01, render: { fillStyle: '#f1c40f' } });
    const force = 18;
    Body.setVelocity(bullet, { x: Math.cos(shootAngle) * force, y: Math.sin(shootAngle) * force });
    
    Body.applyForce(fighter.chest, fighter.chest.position, { x: -Math.cos(shootAngle) * 0.015, y: -Math.sin(shootAngle) * 0.015 });
    
    Composite.add(world, bullet);
    setTimeout(() => Composite.remove(world, bullet), 2000);
}

// 物理更新邏輯
Events.on(engine, 'beforeUpdate', () => {
    [p1, p2].forEach(f => {
        // 自動平衡
        f.chest.torque = (0 - f.chest.angle) * 0.2;
        
        // 頭要立好：強制鎖定頭的角度與角速度
        Body.setAngle(f.head, 0);
        Body.setAngularVelocity(f.head, 0);

        // 讓腳不能搖：強制鎖定腳的角度與角速度
        Body.setAngle(f.leg, 0);
        Body.setAngularVelocity(f.leg, 0);
        
        // 讓魁儡支撐點的 X 座標跟隨角色的胸部，解除原地綁定的限制，實現自由移動
        f.support.pointA.x = f.chest.position.x;
    });
});

// 搖桿設置
const leftJoy = nipplejs.create({ zone: document.getElementById('left-zone'), mode: 'static', position: { left: '100px', bottom: '100px' }, color: 'blue' });
const rightJoy = nipplejs.create({ zone: document.getElementById('right-zone'), mode: 'static', position: { right: '100px', bottom: '100px' }, color: 'red' });

function handleJoystick(manager, fighter) {
    manager.on('move', (evt, data) => {
        const force = data.force;
        let angle = data.angle.radian;

        if (fighter.direction === 1) { 
            angle = -angle; 
        } else {
            angle = Math.PI - angle; 
        }

        Body.setAngle(fighter.arm, angle);

        const now = Date.now();
        
        // 判斷腿部是否與地板有碰撞，確定角色在地板上
        const isGrounded = Query.collides(fighter.leg, [ground]).length > 0;

        // 跳的時候才能移動 (只有在離開地板時，才給予水平移動的推力)
        if (!isGrounded) {
            const moveX = Math.cos(data.angle.radian);
            Body.applyForce(fighter.leg, fighter.leg.position, { x: moveX * 0.007 * Math.min(force, 2), y: 0 });
        }

        if (data.vector && data.vector.y > 0.6 && now - fighter.lastJump > 500 && isGrounded) {
            fighter.lastJump = now;
            // 加大跳躍的作用力 (提升至 -0.8)，讓角色跳得更高
            Body.applyForce(fighter.chest, fighter.chest.position, { x: 0, y: -0.8 });
        }

        if (force > 1.8) shoot(fighter);
    });
}

handleJoystick(leftJoy, p1);
handleJoystick(rightJoy, p2);

// 碰撞偵測
Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
        const checkHit = (bullet, target, fillId, fighter) => {
            if (bullet.label === 'bullet' && (target === fighter.head || target === fighter.chest)) {
                fighter.hp -= 10;
                document.getElementById(fillId).style.width = Math.max(0, fighter.hp) + '%';
                Composite.remove(world, bullet);
                if (fighter.hp <= 0) {
                    // 死後在原本的生成位置上方重生，並恢復血量
                    fighter.hp = 100;
                    document.getElementById(fillId).style.width = '100%';
                    
                    const spawnX = fighter.spawnPos.x;
                    const spawnY = fighter.spawnPos.y - 400; // 在原本生成位置的上方 400 像素處
                    
                    Body.setPosition(fighter.head, { x: spawnX, y: spawnY - 100 });
                    Body.setPosition(fighter.chest, { x: spawnX, y: spawnY - 60 });
                    // 🔥 重生時手臂座標也同步修正
                    Body.setPosition(fighter.arm, { x: spawnX, y: spawnY - 55 });
                    Body.setPosition(fighter.leg, { x: spawnX, y: spawnY });
                    
                    // 🔥 重生時手臂角度重設為正確的朝下角度
                    Body.setAngle(fighter.arm, fighter.direction === 1 ? Math.PI / 2 : -Math.PI / 2);
                    
                    // 清除殘餘的物理速度與旋轉
                    [fighter.head, fighter.chest, fighter.arm, fighter.leg].forEach(b => {
                        Body.setVelocity(b, { x: 0, y: 0 });
                        Body.setAngularVelocity(b, 0);
                    });
                }
            }
        };
        checkHit(pair.bodyA, pair.bodyB, 'p2-fill', p2);
        checkHit(pair.bodyB, pair.bodyA, 'p2-fill', p2);
        checkHit(pair.bodyA, pair.bodyB, 'p1-fill', p1);
        checkHit(pair.bodyB, pair.bodyA, 'p1-fill', p1);
    });
});

window.addEventListener('resize', () => {
    render.canvas.width = window.innerWidth;
    render.canvas.height = window.innerHeight;
});
</script>
</body>
</html>
